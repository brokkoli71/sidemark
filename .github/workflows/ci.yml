name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            gir1.2-poppler-0.18 \
            gir1.2-gtksource-5 \
            libgtk-4-1 libadwaita-1-0 \
            libpoppler-glib8 libgtksourceview-5-0 \
            xvfb

      - name: Run tests
        # GTK4 removed the offscreen backend; xvfb provides a real X11 display
        run: xvfb-run -a python3 test_pdfeditor.py -v

  # ── 2. install.sh end-to-end ───────────────────────────────────────────────
  install-script:
    name: install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            gir1.2-poppler-0.18 \
            gir1.2-gtksource-5 \
            libgtk-4-1 libadwaita-1-0 \
            libpoppler-glib8 libgtksourceview-5-0 \
            librsvg2-bin xvfb

      - name: Run install.sh
        run: ./install.sh

      - name: Verify installed files
        run: |
          set -e
          test -f "$HOME/.local/share/pdf-editor-omarchy/pdfeditor.py"                    && echo "✓ pdfeditor.py"
          test -x "$HOME/.local/bin/pdfeditor"                                            && echo "✓ wrapper"
          test -f "$HOME/.local/share/applications/de.hspitz.pdfeditor.desktop"           && echo "✓ .desktop"
          test -f "$HOME/.local/share/icons/hicolor/scalable/apps/de.hspitz.pdfeditor.svg" && echo "✓ icon SVG"
          test -f "$HOME/.local/share/icons/hicolor/48x48/apps/de.hspitz.pdfeditor.png"   && echo "✓ icon 48px"
          test -f "$HOME/.local/share/icons/hicolor/256x256/apps/de.hspitz.pdfeditor.png" && echo "✓ icon 256px"

      - name: Run unit tests against installed copy
        run: |
          cp test_pdfeditor.py "$HOME/.local/share/pdf-editor-omarchy/"
          cd "$HOME/.local/share/pdf-editor-omarchy"
          xvfb-run -a python3 test_pdfeditor.py -v

      - name: Run install.sh --uninstall
        run: ./install.sh --uninstall

      - name: Verify uninstall cleaned up
        run: |
          set -e
          test ! -f "$HOME/.local/share/pdf-editor-omarchy/pdfeditor.py"                    && echo "✓ app dir removed"
          test ! -x "$HOME/.local/bin/pdfeditor"                                            && echo "✓ wrapper removed"
          test ! -f "$HOME/.local/share/applications/de.hspitz.pdfeditor.desktop"           && echo "✓ .desktop removed"
          test ! -f "$HOME/.local/share/icons/hicolor/scalable/apps/de.hspitz.pdfeditor.svg" && echo "✓ icon removed"
