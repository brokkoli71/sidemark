name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Unit tests on Arch Linux — the target platform ships the GTK4 offscreen
  # backend so GDK_BACKEND=offscreen works with no display setup at all.
  unit-tests:
    name: Unit tests (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            python python-gobject python-cairo \
            gtk4 libadwaita poppler-glib gtksourceview5

      - name: Run tests
        run: GDK_BACKEND=offscreen python3 test_pdfeditor.py -v

  # Verify install.sh places every expected file in the right location.
  # No Python execution — just file-system checks.
  install-script:
    name: install.sh (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 gir1.2-adw-1 \
            gir1.2-poppler-0.18 gir1.2-gtksource-5 \
            libgtk-4-1 libadwaita-1-0 \
            libpoppler-glib8 libgtksourceview-5-0 \
            librsvg2-bin

      - name: Run install.sh
        run: ./install.sh

      - name: Verify installed files
        run: |
          set -e
          test -f "$HOME/.local/share/pdf-editor-omarchy/pdfeditor.py"                     && echo "✓ pdfeditor.py"
          test -x "$HOME/.local/bin/pdfeditor"                                             && echo "✓ wrapper"
          test -f "$HOME/.local/share/applications/de.hspitz.pdfeditor.desktop"            && echo "✓ .desktop"
          test -f "$HOME/.local/share/icons/hicolor/scalable/apps/de.hspitz.pdfeditor.svg" && echo "✓ icon SVG"
          test -f "$HOME/.local/share/icons/hicolor/48x48/apps/de.hspitz.pdfeditor.png"    && echo "✓ icon 48px"
          test -f "$HOME/.local/share/icons/hicolor/256x256/apps/de.hspitz.pdfeditor.png"  && echo "✓ icon 256px"

      - name: Run install.sh --uninstall
        run: ./install.sh --uninstall

      - name: Verify uninstall cleaned up
        run: |
          set -e
          test ! -f "$HOME/.local/share/pdf-editor-omarchy/pdfeditor.py"                     && echo "✓ app dir gone"
          test ! -x "$HOME/.local/bin/pdfeditor"                                             && echo "✓ wrapper gone"
          test ! -f "$HOME/.local/share/applications/de.hspitz.pdfeditor.desktop"            && echo "✓ .desktop gone"
          test ! -f "$HOME/.local/share/icons/hicolor/scalable/apps/de.hspitz.pdfeditor.svg" && echo "✓ icon gone"
