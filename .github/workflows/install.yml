name: Install

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  install:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Arch Linux
            image: archlinux:latest
          - name: Fedora 41
            image: fedora:41

    steps:
      - uses: actions/checkout@v4

      - name: Install sudo (containers may not have it)
        run: |
          if ! command -v sudo &>/dev/null; then
            if command -v pacman &>/dev/null; then pacman -Sy --noconfirm sudo
            elif command -v apt-get &>/dev/null; then apt-get update -qq && apt-get install -y sudo
            elif command -v dnf &>/dev/null; then dnf install -y sudo
            fi
          fi

      - name: Run install.sh -y
        run: GDK_BACKEND=offscreen ./install.sh -y
