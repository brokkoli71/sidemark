<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Dark plate -->
  <rect x="1" y="1" width="46" height="46" rx="11" fill="#1e1d19"/>

  <!--
    Drawn stroke — in screen space, trailing from the nib tip (≈37,39)
    back toward the lower-left, like a natural handwriting arc.
    Drawn first so it sits beneath the pen.
  -->
  <path d="M 38 39 C 30 45 18 43 8 39"
        stroke="#85b34c" stroke-width="2" fill="none"
        stroke-linecap="round" opacity="0.85"/>

  <!-- Pen group, tilted -42° -->
  <g transform="translate(-1, -1) rotate(-42 24 24)">

    <!-- End cap -->
    <rect x="20.5" y="4" width="7" height="3.5" rx="1.75" fill="#496c1e"/>

    <!-- Barrel -->
    <rect x="20" y="7.5" width="8" height="14" rx="4" fill="#85b34c"/>
    <!-- Barrel highlight -->
    <rect x="21" y="8.5" width="2.5" height="9" rx="1.25" fill="#c8e89a" opacity="0.5"/>

    <!-- Grip band -->
    <rect x="20" y="20" width="8" height="3.5" rx="1.2" fill="#496c1e"/>

    <!-- Nib — elongated teardrop, curved sides tapering to a point -->
    <path d="M 22 23.5
             C 14 28, 15 39, 24 46
             C 33 39, 34 28, 26 23.5
             Z"
          fill="#f5f0ea"/>
    <!-- Left face shadow -->
    <path d="M 22 23.5 C 14 28 15 39 24 46 C 21 38 20 29 22 23.5 Z"
          fill="#000" opacity="0.12"/>
    <!-- Centre slit -->
    <line x1="24" y1="28" x2="24" y2="46"
          stroke="#1e1d19" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

    <!-- Ink drop at tip -->
    <ellipse cx="24" cy="45.5" rx="2.6" ry="1.8" fill="#85b34c"/>
    <ellipse cx="23.1" cy="44.8" rx="0.9" ry="0.65" fill="#c8e89a" opacity="0.8"/>

  </g>
</svg>
